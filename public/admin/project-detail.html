<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>案件詳細 | ギョウムラク管理画面</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="min-h-screen bg-slate-50 font-sans text-slate-800 antialiased">

  <header class="border-b border-slate-200 bg-white">
    <div class="mx-auto flex max-w-5xl flex-wrap items-center justify-between gap-4 px-6 py-4">
      <div class="flex items-center gap-6">
        <p class="text-lg font-bold text-slate-900">管理画面</p>
        <nav class="flex items-center gap-4 text-sm font-medium">
          <a href="/admin/dashboard" class="text-slate-500 hover:text-brand-600">ダッシュボード</a>
          <a href="/admin" class="text-slate-500 hover:text-brand-600">お問い合わせ</a>
          <a href="/admin/projects" class="text-brand-600">案件管理</a>
          <a href="/admin/quotes" class="text-slate-500 hover:text-brand-600">見積管理</a>
          <a href="/admin/files" class="text-slate-500 hover:text-brand-600">ファイル管理</a>
          <a id="site-edit-link" href="/admin/settings" class="hidden text-slate-500 hover:text-brand-600">サイト編集</a>
        </nav>
      </div>
      <div class="flex items-center gap-4">
        <span id="current-user" class="text-sm text-slate-500"></span>
        <button id="logout-button" type="button" class="text-sm font-medium text-slate-500 hover:text-brand-600">
          ログアウト
        </button>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-3xl px-6 py-12">
    <a href="/admin/projects" class="text-sm text-slate-500 hover:text-brand-600">← 案件一覧へ戻る</a>

    <p id="load-error" class="mt-10 hidden text-center text-red-600"></p>

    <div id="detail-content" class="hidden">
      <div class="mt-4 flex items-center justify-between gap-4">
        <h1 class="text-xl font-bold text-slate-900">案件詳細</h1>
        <div class="flex gap-2">
          <button id="create-quote-button" type="button" class="hidden btn-secondary">見積作成</button>
          <button id="delete-button" type="button" class="hidden rounded-full border border-red-200 px-4 py-2 text-sm font-semibold text-red-600 transition hover:bg-red-50">
            この案件を削除
          </button>
        </div>
      </div>

      <form id="edit-form" class="card mt-4 space-y-4">
        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
          <div>
            <label class="mb-2 block text-sm font-medium text-slate-700">案件名</label>
            <input name="title" type="text" required class="input-field" />
          </div>
          <div>
            <label class="mb-2 block text-sm font-medium text-slate-700">顧客名</label>
            <input name="customer_name" type="text" required class="input-field" />
          </div>
          <div>
            <label class="mb-2 block text-sm font-medium text-slate-700">顧客メールアドレス</label>
            <input name="customer_email" type="email" class="input-field" />
          </div>
          <div>
            <label class="mb-2 block text-sm font-medium text-slate-700">ステータス</label>
            <select name="status" class="input-field">
              <option value="new">新規</option>
              <option value="hearing">ヒアリング</option>
              <option value="quotation">見積</option>
              <option value="contract">受注</option>
              <option value="development">開発中</option>
              <option value="completed">完了</option>
              <option value="cancel">キャンセル</option>
            </select>
          </div>
        </div>
        <div>
          <label class="mb-2 block text-sm font-medium text-slate-700">メモ</label>
          <textarea name="memo" rows="5" class="input-field"></textarea>
        </div>
        <div class="flex items-center gap-3">
          <button id="save-button" type="submit" class="btn-primary hidden">保存する</button>
          <p id="save-status" class="hidden text-sm"></p>
        </div>
      </form>

      <!-- 見積 -->
      <div class="card mt-4">
        <p class="text-sm font-semibold text-slate-900">見積</p>
        <p id="quotes-empty" class="mt-4 hidden text-sm text-slate-500">この案件の見積はまだありません。</p>
        <div class="mt-4 divide-y divide-slate-100" id="quote-list"></div>
      </div>

      <!-- 添付ファイル -->
      <div class="card mt-4">
        <p class="text-sm font-semibold text-slate-900">添付ファイル</p>

        <div id="upload-section" class="mt-4 hidden">
          <label
            id="drop-zone"
            for="file-input"
            class="flex cursor-pointer flex-col items-center justify-center rounded-2xl border-2 border-dashed border-slate-300 bg-slate-50 px-6 py-8 text-center transition hover:border-brand-400 hover:bg-brand-50"
          >
            <p class="text-sm text-slate-600">ここにファイルをドラッグ&ドロップ、またはクリックして選択</p>
            <p class="mt-1 text-xs text-slate-400">1ファイルあたり20MBまで</p>
            <input id="file-input" type="file" class="hidden" />
          </label>
          <p id="upload-status" class="mt-3 hidden text-sm"></p>
        </div>

        <p id="files-empty" class="mt-4 hidden text-sm text-slate-500">添付ファイルはまだありません。</p>
        <div class="mt-4 grid grid-cols-2 gap-4 sm:grid-cols-3" id="file-grid"></div>
      </div>
    </div>
  </main>

  <template id="quote-item-template">
    <div class="flex flex-wrap items-center justify-between gap-2 py-3 text-sm">
      <div>
        <a data-field="quote-number" href="#" class="font-medium text-slate-900 hover:text-brand-600"></a>
        <p class="text-xs text-slate-400" data-field="updated"></p>
      </div>
      <div class="flex items-center gap-3">
        <span class="rounded-full bg-slate-100 px-2.5 py-1 text-xs font-medium text-slate-600" data-field="status"></span>
        <span class="font-semibold text-slate-900" data-field="total"></span>
      </div>
    </div>
  </template>

  <template id="file-card-template">
    <div class="card flex flex-col p-4" data-id="">
      <div class="flex aspect-square items-center justify-center overflow-hidden rounded-lg bg-slate-100" data-field="thumb-wrap">
        <img data-field="thumb-img" class="hidden h-full w-full object-cover" alt="" />
        <svg data-field="icon-file" class="hidden h-8 w-8 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
        </svg>
        <svg data-field="icon-pdf" class="hidden h-8 w-8 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
        </svg>
      </div>
      <p class="mt-2 truncate text-xs font-medium text-slate-900" data-field="name"></p>
      <div class="mt-2 flex flex-wrap gap-2">
        <a data-field="open-link" href="#" target="_blank" rel="noopener" class="btn-secondary flex-1 !px-2 !py-1 text-center text-xs">開く</a>
        <button type="button" data-field="copy-button" class="btn-secondary flex-1 !px-2 !py-1 text-xs">コピー</button>
        <button type="button" data-field="delete-button" class="hidden w-full rounded-full border border-red-200 px-2 py-1 text-xs font-semibold text-red-600 transition hover:bg-red-50">削除</button>
      </div>
    </div>
  </template>

  <script src="/js/admin-common.js"></script>
  <script src="/js/admin-project-detail.js"></script>
</body>
</html>
