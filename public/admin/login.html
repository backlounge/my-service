<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ログイン | ギョウムラク管理画面</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="flex min-h-screen items-center justify-center bg-slate-50 font-sans text-slate-800 antialiased">

  <main class="w-full max-w-sm px-6">
    <div class="card">
      <h1 class="text-lg font-semibold text-slate-900">管理画面ログイン</h1>
      <form id="login-form" class="mt-6 space-y-4">
        <div>
          <label for="email" class="mb-2 block text-sm font-medium text-slate-700">メールアドレス</label>
          <input id="email" name="email" type="email" required class="input-field" autocomplete="username" />
        </div>
        <div>
          <label for="password" class="mb-2 block text-sm font-medium text-slate-700">パスワード</label>
          <input id="password" name="password" type="password" required class="input-field" autocomplete="current-password" />
        </div>
        <button type="submit" class="btn-primary w-full">ログイン</button>
        <p id="login-error" class="hidden text-sm text-red-600"></p>
      </form>
    </div>
  </main>

  <script src="/js/admin-login.js"></script>
</body>
</html>
