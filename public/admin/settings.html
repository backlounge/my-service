<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>サイト編集 | ギョウムラク管理画面</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="min-h-screen bg-slate-50 font-sans text-slate-800 antialiased">

  <header class="border-b border-slate-200 bg-white">
    <div class="mx-auto flex max-w-5xl flex-wrap items-center justify-between gap-4 px-6 py-4">
      <div class="flex items-center gap-6">
        <p class="text-lg font-bold text-slate-900">管理画面</p>
        <nav class="flex items-center gap-4 text-sm font-medium">
          <a href="/admin/dashboard" class="text-slate-500 hover:text-brand-600">ダッシュボード</a>
          <a href="/admin" class="text-slate-500 hover:text-brand-600">お問い合わせ</a>
          <a href="/admin/files" class="text-slate-500 hover:text-brand-600">ファイル管理</a>
          <a id="site-edit-link" href="/admin/settings" class="hidden text-brand-600">サイト編集</a>
        </nav>
      </div>
      <div class="flex items-center gap-4">
        <span id="current-user" class="text-sm text-slate-500"></span>
        <button id="logout-button" type="button" class="text-sm font-medium text-slate-500 hover:text-brand-600">
          ログアウト
        </button>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-3xl px-6 py-12">
    <div class="flex items-center justify-between gap-4">
      <div>
        <h1 class="text-xl font-bold text-slate-900">サイト編集</h1>
        <p class="mt-1 text-sm text-slate-500">
          トップページ(/)の内容を編集できます。未入力のまま保存した項目は現在の表示のまま変わりません。
        </p>
      </div>
    </div>

    <p id="forbidden-message" class="mt-10 hidden text-center text-red-600">
      この画面の利用には管理者権限が必要です。
    </p>
    <p id="load-error" class="mt-10 hidden text-center text-red-600"></p>

    <form id="settings-form" class="mt-8 hidden space-y-8"></form>

    <p id="save-status" class="mt-4 hidden text-sm" role="status"></p>
  </main>

  <template id="field-group-template">
    <fieldset class="card">
      <legend class="px-1 text-sm font-semibold text-brand-600" data-field="group-title"></legend>
      <div class="mt-2 space-y-4" data-field="fields"></div>
    </fieldset>
  </template>

  <template id="field-text-template">
    <div>
      <label class="mb-2 block text-sm font-medium text-slate-700" data-field="label"></label>
      <input type="text" class="input-field" data-field="input" />
    </div>
  </template>

  <template id="field-textarea-template">
    <div>
      <label class="mb-2 block text-sm font-medium text-slate-700" data-field="label"></label>
      <textarea rows="3" class="input-field" data-field="input"></textarea>
    </div>
  </template>

  <script src="/js/admin-common.js"></script>
  <script src="/js/admin-settings.js"></script>
</body>
</html>
