<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>案件管理 | ギョウムラク管理画面</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="min-h-screen bg-slate-50 font-sans text-slate-800 antialiased">

  <header class="border-b border-slate-200 bg-white">
    <div class="mx-auto flex max-w-5xl flex-wrap items-center justify-between gap-4 px-6 py-4">
      <div class="flex items-center gap-6">
        <p class="text-lg font-bold text-slate-900">管理画面</p>
        <nav class="flex items-center gap-4 text-sm font-medium">
          <a href="/admin/dashboard" class="text-slate-500 hover:text-brand-600">ダッシュボード</a>
          <a href="/admin" class="text-slate-500 hover:text-brand-600">お問い合わせ</a>
          <a href="/admin/projects" class="text-brand-600">案件管理</a>
          <a href="/admin/files" class="text-slate-500 hover:text-brand-600">ファイル管理</a>
          <a id="site-edit-link" href="/admin/settings" class="hidden text-slate-500 hover:text-brand-600">サイト編集</a>
        </nav>
      </div>
      <div class="flex items-center gap-4">
        <span id="current-user" class="text-sm text-slate-500"></span>
        <button id="logout-button" type="button" class="text-sm font-medium text-slate-500 hover:text-brand-600">
          ログアウト
        </button>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-5xl px-6 py-12">
    <div class="flex flex-wrap items-center justify-between gap-4">
      <h1 class="text-xl font-bold text-slate-900">案件管理</h1>
      <div class="flex flex-wrap gap-2">
        <input id="search-input" type="search" class="input-field max-w-xs" placeholder="案件名・顧客名で検索" />
        <button id="new-project-button" type="button" class="btn-primary hidden">新規作成</button>
      </div>
    </div>

    <div class="mt-4 flex flex-wrap gap-2" id="status-filters">
      <button type="button" data-status="" class="filter-btn">すべて</button>
      <button type="button" data-status="new" class="filter-btn">新規</button>
      <button type="button" data-status="hearing" class="filter-btn">ヒアリング</button>
      <button type="button" data-status="quotation" class="filter-btn">見積</button>
      <button type="button" data-status="contract" class="filter-btn">受注</button>
      <button type="button" data-status="development" class="filter-btn">開発中</button>
      <button type="button" data-status="completed" class="filter-btn">完了</button>
      <button type="button" data-status="cancel" class="filter-btn">キャンセル</button>
    </div>

    <p id="role-notice" class="mt-4 hidden text-sm text-slate-500">
      閲覧のみ可能です。新規作成・編集・削除には管理者権限が必要です。
    </p>

    <!-- 新規作成フォーム(管理者のみ) -->
    <form id="create-form" class="card mt-4 hidden space-y-4">
      <h2 class="text-sm font-semibold text-slate-900">新規案件を作成</h2>
      <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
        <div>
          <label class="mb-2 block text-sm font-medium text-slate-700">案件名 <span class="text-red-500">*</span></label>
          <input name="title" type="text" required class="input-field" />
        </div>
        <div>
          <label class="mb-2 block text-sm font-medium text-slate-700">顧客名 <span class="text-red-500">*</span></label>
          <input name="customer_name" type="text" required class="input-field" />
        </div>
        <div>
          <label class="mb-2 block text-sm font-medium text-slate-700">顧客メールアドレス</label>
          <input name="customer_email" type="email" class="input-field" />
        </div>
        <div>
          <label class="mb-2 block text-sm font-medium text-slate-700">ステータス</label>
          <select name="status" class="input-field">
            <option value="new">新規</option>
            <option value="hearing">ヒアリング</option>
            <option value="quotation">見積</option>
            <option value="contract">受注</option>
            <option value="development">開発中</option>
            <option value="completed">完了</option>
            <option value="cancel">キャンセル</option>
          </select>
        </div>
      </div>
      <div>
        <label class="mb-2 block text-sm font-medium text-slate-700">メモ</label>
        <textarea name="memo" rows="3" class="input-field"></textarea>
      </div>
      <div class="flex gap-3">
        <button type="submit" class="btn-primary">作成する</button>
        <button type="button" id="cancel-create-button" class="btn-secondary">キャンセル</button>
      </div>
      <p id="create-error" class="hidden text-sm text-red-600"></p>
    </form>

    <p id="load-error" class="mt-10 hidden text-center text-red-600"></p>
    <p id="empty-message" class="mt-10 hidden text-center text-slate-500">案件はまだありません。</p>

    <div class="mt-6 space-y-4" id="project-list"></div>
  </main>

  <template id="project-card-template">
    <div class="card" data-id="">
      <div class="flex flex-wrap items-start justify-between gap-4">
        <div>
          <a data-field="title" href="#" class="font-semibold text-slate-900 hover:text-brand-600"></a>
          <p class="text-sm text-slate-500" data-field="customer"></p>
        </div>
        <div class="flex items-center gap-3">
          <select data-field="status" class="input-field !w-auto">
            <option value="new">新規</option>
            <option value="hearing">ヒアリング</option>
            <option value="quotation">見積</option>
            <option value="contract">受注</option>
            <option value="development">開発中</option>
            <option value="completed">完了</option>
            <option value="cancel">キャンセル</option>
          </select>
          <button type="button" data-field="delete-button" class="hidden rounded-full border border-red-200 px-3 py-1.5 text-xs font-semibold text-red-600 transition hover:bg-red-50">
            削除
          </button>
        </div>
      </div>
      <p class="mt-2 text-xs text-slate-400" data-field="updated"></p>
    </div>
  </template>

  <script src="/js/admin-common.js"></script>
  <script src="/js/admin-projects.js"></script>
</body>
</html>
