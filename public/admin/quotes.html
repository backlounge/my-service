<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>見積管理 | ギョウムラク管理画面</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="min-h-screen bg-slate-50 font-sans text-slate-800 antialiased">

  <header class="border-b border-slate-200 bg-white">
    <div class="mx-auto flex max-w-5xl flex-wrap items-center justify-between gap-4 px-6 py-4">
      <div class="flex items-center gap-6">
        <p class="text-lg font-bold text-slate-900">管理画面</p>
        <nav class="flex items-center gap-4 text-sm font-medium">
          <a href="/admin/dashboard" class="text-slate-500 hover:text-brand-600">ダッシュボード</a>
          <a href="/admin" class="text-slate-500 hover:text-brand-600">お問い合わせ</a>
          <a href="/admin/projects" class="text-slate-500 hover:text-brand-600">案件管理</a>
          <a href="/admin/quotes" class="text-brand-600">見積管理</a>
          <a href="/admin/files" class="text-slate-500 hover:text-brand-600">ファイル管理</a>
          <a id="site-edit-link" href="/admin/settings" class="hidden text-slate-500 hover:text-brand-600">サイト編集</a>
        </nav>
      </div>
      <div class="flex items-center gap-4">
        <span id="current-user" class="text-sm text-slate-500"></span>
        <button id="logout-button" type="button" class="text-sm font-medium text-slate-500 hover:text-brand-600">
          ログアウト
        </button>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-5xl px-6 py-12">
    <div class="flex flex-wrap items-center justify-between gap-4">
      <h1 class="text-xl font-bold text-slate-900">見積管理</h1>
      <input id="search-input" type="search" class="input-field max-w-xs" placeholder="見積番号・案件名・顧客名で検索" />
    </div>

    <p class="mt-2 text-sm text-slate-500">
      見積は案件詳細画面(「見積作成」ボタン)から作成します。
    </p>

    <div class="mt-4 flex flex-wrap gap-2" id="status-filters">
      <button type="button" data-status="" class="filter-btn">すべて</button>
      <button type="button" data-status="draft" class="filter-btn">下書き</button>
      <button type="button" data-status="sent" class="filter-btn">送付済み</button>
      <button type="button" data-status="accepted" class="filter-btn">受注</button>
      <button type="button" data-status="rejected" class="filter-btn">却下</button>
    </div>

    <p id="role-notice" class="mt-4 hidden text-sm text-slate-500">
      閲覧のみ可能です。作成・編集・削除には管理者権限が必要です。
    </p>

    <p id="load-error" class="mt-10 hidden text-center text-red-600"></p>
    <p id="empty-message" class="mt-10 hidden text-center text-slate-500">見積はまだありません。</p>

    <div class="mt-6 space-y-4" id="quote-list"></div>
  </main>

  <template id="quote-card-template">
    <div class="card" data-id="">
      <div class="flex flex-wrap items-start justify-between gap-4">
        <div>
          <a data-field="quote-number" href="#" class="font-semibold text-slate-900 hover:text-brand-600"></a>
          <p class="text-sm text-slate-500" data-field="project"></p>
          <p class="text-sm text-slate-500" data-field="customer"></p>
        </div>
        <div class="flex items-center gap-3">
          <span class="rounded-full bg-slate-100 px-3 py-1 text-xs font-medium text-slate-600" data-field="status"></span>
          <span class="text-sm font-semibold text-slate-900" data-field="total"></span>
          <button type="button" data-field="delete-button" class="hidden rounded-full border border-red-200 px-3 py-1.5 text-xs font-semibold text-red-600 transition hover:bg-red-50">
            削除
          </button>
        </div>
      </div>
      <p class="mt-2 text-xs text-slate-400" data-field="updated"></p>
    </div>
  </template>

  <script src="/js/admin-common.js"></script>
  <script src="/js/admin-quotes.js"></script>
</body>
</html>
