<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>見積詳細 | ギョウムラク管理画面</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="min-h-screen bg-slate-50 font-sans text-slate-800 antialiased">

  <header class="border-b border-slate-200 bg-white">
    <div class="mx-auto flex max-w-5xl flex-wrap items-center justify-between gap-4 px-6 py-4">
      <div class="flex items-center gap-6">
        <p class="text-lg font-bold text-slate-900">管理画面</p>
        <nav class="flex items-center gap-4 text-sm font-medium">
          <a href="/admin/dashboard" class="text-slate-500 hover:text-brand-600">ダッシュボード</a>
          <a href="/admin" class="text-slate-500 hover:text-brand-600">お問い合わせ</a>
          <a href="/admin/projects" class="text-slate-500 hover:text-brand-600">案件管理</a>
          <a href="/admin/quotes" class="text-brand-600">見積管理</a>
          <a href="/admin/files" class="text-slate-500 hover:text-brand-600">ファイル管理</a>
          <a id="site-edit-link" href="/admin/settings" class="hidden text-slate-500 hover:text-brand-600">サイト編集</a>
        </nav>
      </div>
      <div class="flex items-center gap-4">
        <span id="current-user" class="text-sm text-slate-500"></span>
        <button id="logout-button" type="button" class="text-sm font-medium text-slate-500 hover:text-brand-600">
          ログアウト
        </button>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-4xl px-6 py-12">
    <a href="/admin/quotes" class="text-sm text-slate-500 hover:text-brand-600">← 見積一覧へ戻る</a>

    <p id="load-error" class="mt-10 hidden text-center text-red-600"></p>

    <div id="detail-content" class="hidden">
      <div class="mt-4 flex flex-wrap items-center justify-between gap-4">
        <div>
          <h1 class="text-xl font-bold text-slate-900" id="quote-number-heading"></h1>
          <p class="text-sm text-slate-500" id="quote-project-line"></p>
        </div>
        <div class="flex flex-wrap gap-2">
          <a id="pdf-view-link" href="#" target="_blank" rel="noopener" class="btn-secondary">PDFを表示</a>
          <a id="pdf-download-link" href="#" class="btn-secondary">PDFをダウンロード</a>
          <button id="duplicate-button" type="button" class="hidden btn-secondary">複製</button>
          <button id="delete-button" type="button" class="hidden rounded-full border border-red-200 px-4 py-2 text-sm font-semibold text-red-600 transition hover:bg-red-50">
            削除
          </button>
        </div>
      </div>

      <!-- ヘッダー情報 -->
      <div class="card mt-4">
        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-4">
          <div>
            <label class="mb-2 block text-sm font-medium text-slate-700">ステータス</label>
            <select id="field-status" class="input-field">
              <option value="draft">下書き</option>
              <option value="sent">送付済み</option>
              <option value="accepted">受注</option>
              <option value="rejected">却下</option>
            </select>
          </div>
          <div>
            <label class="mb-2 block text-sm font-medium text-slate-700">見積日</label>
            <input id="field-quote-date" type="date" class="input-field" />
          </div>
          <div>
            <label class="mb-2 block text-sm font-medium text-slate-700">有効期限</label>
            <input id="field-valid-until" type="date" class="input-field" />
          </div>
          <div>
            <label class="mb-2 block text-sm font-medium text-slate-700">担当者</label>
            <input id="field-assignee" type="text" class="input-field" />
          </div>
        </div>
      </div>

      <!-- 明細 -->
      <div class="card mt-4">
        <div class="flex items-center justify-between gap-4">
          <p class="text-sm font-semibold text-slate-900">明細</p>
          <button id="add-item-button" type="button" class="btn-secondary hidden !px-3 !py-1.5 text-xs">+ 行を追加</button>
        </div>

        <div class="mt-4 overflow-x-auto">
          <table class="w-full min-w-[720px] text-sm">
            <thead>
              <tr class="border-b border-slate-200 text-left text-xs text-slate-500">
                <th class="w-8"></th>
                <th class="py-2 pr-2">商品名・仕様</th>
                <th class="w-20 px-2">数量</th>
                <th class="w-20 px-2">単位</th>
                <th class="w-28 px-2">単価</th>
                <th class="w-24 px-2">値引</th>
                <th class="w-20 px-2">税率%</th>
                <th class="w-28 px-2 text-right">金額</th>
                <th class="w-16"></th>
              </tr>
            </thead>
            <tbody id="item-rows"></tbody>
          </table>
        </div>

        <div class="mt-4 flex justify-end">
          <div class="w-full max-w-xs space-y-1 text-sm">
            <div class="flex justify-between"><span class="text-slate-500">小計</span><span id="calc-subtotal">¥0</span></div>
            <div class="flex justify-between"><span class="text-slate-500">消費税</span><span id="calc-tax">¥0</span></div>
            <div class="flex justify-between border-t border-slate-200 pt-1 font-semibold text-slate-900">
              <span>合計(税込)</span><span id="calc-total">¥0</span>
            </div>
          </div>
        </div>

        <div class="mt-4 flex items-center gap-3">
          <button id="save-button" type="button" class="hidden btn-primary">保存する</button>
          <p id="save-status" class="hidden text-sm"></p>
        </div>
      </div>

      <!-- 添付ファイル -->
      <div class="card mt-4">
        <p class="text-sm font-semibold text-slate-900">添付ファイル</p>

        <div id="upload-section" class="mt-4 hidden">
          <label id="drop-zone" for="file-input" class="flex cursor-pointer flex-col items-center justify-center rounded-2xl border-2 border-dashed border-slate-300 bg-slate-50 px-6 py-8 text-center transition hover:border-brand-400 hover:bg-brand-50">
            <p class="text-sm text-slate-600">ここにファイルをドラッグ&ドロップ、またはクリックして選択</p>
            <p class="mt-1 text-xs text-slate-400">1ファイルあたり20MBまで</p>
            <input id="file-input" type="file" class="hidden" />
          </label>
          <p id="upload-status" class="mt-3 hidden text-sm"></p>
        </div>

        <p id="files-empty" class="mt-4 hidden text-sm text-slate-500">添付ファイルはまだありません。</p>
        <div class="mt-4 grid grid-cols-2 gap-4 sm:grid-cols-3" id="file-grid"></div>
      </div>

      <!-- バージョン履歴 -->
      <div class="card mt-4">
        <p class="text-sm font-semibold text-slate-900">変更履歴</p>
        <div class="mt-4 divide-y divide-slate-100" id="version-list"></div>
      </div>
    </div>
  </main>

  <template id="item-row-template">
    <tr class="border-b border-slate-100">
      <td class="py-2 text-center">
        <div class="flex flex-col">
          <button type="button" data-action="move-up" class="text-slate-400 hover:text-brand-600">▲</button>
          <button type="button" data-action="move-down" class="text-slate-400 hover:text-brand-600">▼</button>
        </div>
      </td>
      <td class="py-2 pr-2">
        <input data-field="product_name" type="text" class="input-field" placeholder="商品名・仕様" />
        <input data-field="note" type="text" class="input-field mt-1 text-xs" placeholder="備考(任意)" />
      </td>
      <td class="px-2"><input data-field="quantity" type="number" step="any" class="input-field" /></td>
      <td class="px-2"><input data-field="unit" type="text" class="input-field" placeholder="式" /></td>
      <td class="px-2"><input data-field="unit_price" type="number" step="any" class="input-field" /></td>
      <td class="px-2"><input data-field="discount" type="number" step="any" class="input-field" /></td>
      <td class="px-2"><input data-field="tax_rate" type="number" step="any" class="input-field" /></td>
      <td class="px-2 text-right" data-field="amount">¥0</td>
      <td class="px-2 text-center">
        <button type="button" data-action="remove" class="text-red-400 hover:text-red-600">削除</button>
      </td>
    </tr>
  </template>

  <template id="file-card-template">
    <div class="card flex flex-col p-4" data-id="">
      <div class="flex aspect-square items-center justify-center overflow-hidden rounded-lg bg-slate-100" data-field="thumb-wrap">
        <img data-field="thumb-img" class="hidden h-full w-full object-cover" alt="" />
        <svg data-field="icon-file" class="hidden h-8 w-8 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
        </svg>
        <svg data-field="icon-pdf" class="hidden h-8 w-8 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
        </svg>
      </div>
      <p class="mt-2 truncate text-xs font-medium text-slate-900" data-field="name"></p>
      <div class="mt-2 flex flex-wrap gap-2">
        <a data-field="open-link" href="#" target="_blank" rel="noopener" class="btn-secondary flex-1 !px-2 !py-1 text-center text-xs">開く</a>
        <button type="button" data-field="copy-button" class="btn-secondary flex-1 !px-2 !py-1 text-xs">コピー</button>
        <button type="button" data-field="delete-button" class="hidden w-full rounded-full border border-red-200 px-2 py-1 text-xs font-semibold text-red-600 transition hover:bg-red-50">削除</button>
      </div>
    </div>
  </template>

  <template id="version-item-template">
    <div class="flex flex-wrap items-center justify-between gap-2 py-3 text-sm">
      <div>
        <p class="font-medium text-slate-900" data-field="label"></p>
        <p class="text-xs text-slate-400" data-field="meta"></p>
      </div>
      <button type="button" data-field="restore-button" class="hidden btn-secondary !px-3 !py-1 text-xs">このバージョンに復元</button>
    </div>
  </template>

  <script src="/js/admin-common.js"></script>
  <script src="/js/admin-quote-detail.js"></script>
</body>
</html>
