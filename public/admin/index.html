<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理画面 | ギョウムラク</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="min-h-screen bg-slate-50 font-sans text-slate-800 antialiased">

  <header class="border-b border-slate-200 bg-white">
    <div class="mx-auto flex max-w-5xl flex-wrap items-center justify-between gap-4 px-6 py-4">
      <div class="flex items-center gap-6">
        <p class="text-lg font-bold text-slate-900">管理画面</p>
        <nav class="flex items-center gap-4 text-sm font-medium">
          <a href="/admin/dashboard" class="text-slate-500 hover:text-brand-600">ダッシュボード</a>
          <a href="/admin" class="text-brand-600">お問い合わせ</a>
          <a href="/admin/files" class="text-slate-500 hover:text-brand-600">ファイル管理</a>
          <a id="site-edit-link" href="/admin/settings" class="hidden text-slate-500 hover:text-brand-600">サイト編集</a>
        </nav>
      </div>
      <div class="flex items-center gap-4">
        <span id="current-user" class="text-sm text-slate-500"></span>
        <button id="logout-button" type="button" class="text-sm font-medium text-slate-500 hover:text-brand-600">
          ログアウト
        </button>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-5xl px-6 py-12">
    <div class="flex flex-wrap items-center justify-between gap-4">
      <div class="flex gap-2" id="status-filters">
        <button type="button" data-status="" class="filter-btn">すべて</button>
        <button type="button" data-status="new" class="filter-btn">new</button>
        <button type="button" data-status="doing" class="filter-btn">doing</button>
        <button type="button" data-status="done" class="filter-btn">done</button>
      </div>
      <button id="refresh-button" type="button" class="btn-secondary">更新</button>
    </div>

    <p id="role-notice" class="mt-4 hidden text-sm text-slate-500">
      閲覧のみ可能です。ステータスの変更には管理者権限が必要です。
    </p>

    <p id="empty-message" class="mt-10 hidden text-center text-slate-500">お問い合わせはまだありません。</p>
    <p id="load-error" class="mt-10 hidden text-center text-red-600"></p>

    <div class="mt-6 space-y-4" id="contact-list"></div>
  </main>

  <template id="contact-card-template">
    <div class="card" data-id="">
      <div class="flex flex-wrap items-start justify-between gap-4">
        <div>
          <p class="font-semibold text-slate-900" data-field="name"></p>
          <p class="text-sm text-slate-500" data-field="company"></p>
          <p class="text-sm text-slate-500" data-field="email"></p>
        </div>
        <div class="flex items-center gap-3">
          <span class="text-xs text-slate-400" data-field="created_at"></span>
          <select data-field="status" class="input-field !w-auto">
            <option value="new">new</option>
            <option value="doing">doing</option>
            <option value="done">done</option>
          </select>
        </div>
      </div>
      <p class="mt-4 whitespace-pre-wrap text-sm text-slate-700" data-field="message"></p>
    </div>
  </template>

  <script src="/js/admin-common.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
