<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ファイル管理 | ギョウムラク管理画面</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="min-h-screen bg-slate-50 font-sans text-slate-800 antialiased">

  <header class="border-b border-slate-200 bg-white">
    <div class="mx-auto flex max-w-5xl flex-wrap items-center justify-between gap-4 px-6 py-4">
      <div class="flex items-center gap-6">
        <p class="text-lg font-bold text-slate-900">管理画面</p>
        <nav class="flex items-center gap-4 text-sm font-medium">
          <a href="/admin/dashboard" class="text-slate-500 hover:text-brand-600">ダッシュボード</a>
          <a href="/admin" class="text-slate-500 hover:text-brand-600">お問い合わせ</a>
          <a href="/admin/files" class="text-brand-600">ファイル管理</a>
          <a id="site-edit-link" href="/admin/settings" class="hidden text-slate-500 hover:text-brand-600">サイト編集</a>
        </nav>
      </div>
      <div class="flex items-center gap-4">
        <span id="current-user" class="text-sm text-slate-500"></span>
        <button id="logout-button" type="button" class="text-sm font-medium text-slate-500 hover:text-brand-600">
          ログアウト
        </button>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-5xl px-6 py-12">
    <div class="flex flex-wrap items-center justify-between gap-4">
      <h1 class="text-xl font-bold text-slate-900">ファイル管理</h1>
      <input
        id="search-input"
        type="search"
        class="input-field max-w-xs"
        placeholder="ファイル名で検索"
      />
    </div>

    <p id="role-notice" class="mt-4 hidden text-sm text-slate-500">
      閲覧・URLコピーのみ可能です。アップロード・削除には管理者権限が必要です。
    </p>

    <!-- アップロードエリア(管理者のみ表示) -->
    <div id="upload-section" class="mt-6 hidden">
      <label
        id="drop-zone"
        for="file-input"
        class="flex cursor-pointer flex-col items-center justify-center rounded-2xl border-2 border-dashed border-slate-300 bg-white px-6 py-10 text-center transition hover:border-brand-400 hover:bg-brand-50"
      >
        <svg class="h-8 w-8 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 7.5 12 3m0 0L7.5 7.5M12 3v13.5" />
        </svg>
        <p class="mt-3 text-sm text-slate-600">
          ここにファイルをドラッグ&ドロップ、またはクリックして選択
        </p>
        <p class="mt-1 text-xs text-slate-400">1ファイルあたり20MBまで</p>
        <input id="file-input" type="file" class="hidden" />
      </label>
      <p id="upload-status" class="mt-3 hidden text-sm"></p>
    </div>

    <p id="load-error" class="mt-10 hidden text-center text-red-600"></p>
    <p id="empty-message" class="mt-10 hidden text-center text-slate-500">ファイルはまだありません。</p>

    <div class="mt-6 grid grid-cols-2 gap-4 sm:grid-cols-3 lg:grid-cols-4" id="file-grid"></div>
  </main>

  <template id="file-card-template">
    <div class="card flex flex-col p-4" data-id="">
      <div class="flex aspect-square items-center justify-center overflow-hidden rounded-lg bg-slate-100" data-field="thumb-wrap">
        <img data-field="thumb-img" class="hidden h-full w-full object-cover" alt="" />
        <svg data-field="icon-file" class="hidden h-10 w-10 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
        </svg>
        <svg data-field="icon-pdf" class="hidden h-10 w-10 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
        </svg>
      </div>
      <p class="mt-3 truncate text-sm font-medium text-slate-900" data-field="name"></p>
      <p class="text-xs text-slate-400" data-field="meta"></p>
      <div class="mt-3 flex flex-wrap gap-2">
        <a data-field="open-link" href="#" target="_blank" rel="noopener" class="btn-secondary flex-1 !px-3 !py-1.5 text-center text-xs">開く</a>
        <button type="button" data-field="copy-button" class="btn-secondary flex-1 !px-3 !py-1.5 text-xs">URLをコピー</button>
        <button type="button" data-field="delete-button" class="hidden w-full rounded-full border border-red-200 px-3 py-1.5 text-xs font-semibold text-red-600 transition hover:bg-red-50">削除</button>
      </div>
    </div>
  </template>

  <script src="/js/admin-common.js"></script>
  <script src="/js/admin-files.js"></script>
</body>
</html>
